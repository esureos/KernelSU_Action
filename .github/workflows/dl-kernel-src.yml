name: Download Kernel Source Code

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Input a Kernel Version'
        required: false
        default: 'android12-5.10-2024-03' # 默认选择标签
        type: string

jobs:
  download:
    permissions:
      contents: write
    name: Download by ${{ github.actor }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        ref: main
    - name: Read the Configuration
      if: if [[ -n ${{ github.event.inputs.version }} ]]; then
      run: |
        echo "KERNEL_SOURCE_BRANCH=${{ github.event.inputs.version }}
    - name: Download Source Code
      id: code
      run: |
        sudo apt-get update && sudo apt-get upgrade -y
        mkdir $GITHUB_WORKSPACE/android-kernel && cd $GITHUB_WORKSPACE/android-kernel
        aria2c https://android.googlesource.com/kernel/common/+archive/refs/heads/${{ KERNEL_SOURCE_BRANCH }}.tar.gz -o ${{ KERNEL_SOURCE_BRANCH }}.tar.gz

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ KERNEL_SOURCE_BRANCH }}
        path: |
          ./android-kernel/${{ KERNEL_SOURCE_BRANCH }}.tar.gz

    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ KERNEL_SOURCE_BRANCH }}
        files: |
          ./android-kernel/${{ KERNEL_SOURCE_BRANCH }}.tar.gz
