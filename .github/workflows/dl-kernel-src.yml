name: Download Kernel Source Code

on:
  push:
    branches:
      - 'main'
    paths:
      - 'config.env' # 监听指定文件的修改
      - 'config.gki12510.env' # 监听另一个文件的修改
  workflow_dispatch:
    inputs:
      config:
        description: 'Choose a config.env'
        required: true
        default: 'config.env' # 默认选择标签
        options:
          - 'config.env'
          - 'config.properties.gki_12510'
        type: choice

jobs:
  download:
    permissions:
      contents: write
    name: Download by ${{ github.actor }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        ref: main
    - name: Determine Changed File
      id: determine_changed_file
      if: github.event_name == 'push'
      run: |
        if git rev-parse --verify HEAD >/dev/null 2>&1; then
          if [[ $(git diff --name-only HEAD^) =~ "config.env" ]]; then
            echo "::set-output name=changed_file::config.env"
          elif [[ $(git diff --name-only HEAD^) =~ "config.properties.gki_12510" ]]; then
            echo "::set-output name=changed_file::config.properties.gki_12510"
          fi
        else
          echo "No previous commit found."
        fi
    - name: Read the Configuration
      if: github.event_name == 'workflow_dispatch'
      run: |
        CONFIG_ENV=${{ github.event.inputs.config }}
        echo "KERNEL_SOURCE=$(cat $CONFIG_ENV | grep -w "KERNEL_SOURCE" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "KERNEL_SOURCE_BRANCH=$(cat $CONFIG_ENV | grep -w "KERNEL_SOURCE_BRANCH" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
    - name: Read the Configuration
      if: github.event_name == 'push'
      run: |
        CONFIG_ENV=${{ github.event.inputs.config }}
        echo "KERNEL_SOURCE=$(cat $CONFIG_ENV | grep -w "KERNEL_SOURCE" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "KERNEL_SOURCE_BRANCH=$(cat $CONFIG_ENV | grep -w "KERNEL_SOURCE_BRANCH" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV

    - name: Download Source Code
      id: code
      run: |
        sudo apt-get update && sudo apt-get upgrade -y
        mkdir $GITHUB_WORKSPACE/android-kernel && cd $GITHUB_WORKSPACE/android-kernel
        aria2c ${{ env.KERNEL_SOURCE }}/+archive/refs/heads/${{ env.KERNEL_SOURCE_BRANCH }}.tar.gz -o ${{ env.KERNEL_SOURCE_BRANCH }}.tar.gz

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.KERNEL_SOURCE_BRANCH }}
        path: |
          ./android-kernel/${{ env.KERNEL_SOURCE_BRANCH }}.tar.gz

    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.KERNEL_SOURCE_BRANCH }}
        files: |
          ./android-kernel/${{ env.KERNEL_SOURCE_BRANCH }}.tar.gz
