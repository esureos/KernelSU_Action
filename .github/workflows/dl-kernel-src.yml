name: Download Kernel Source Code

on:
  push:
    branches:
      - 'main'
    paths:
      - 'config.env'
      - 'config.gki.env'
  workflow_dispatch:
    inputs:
      config:
        description: 'Choose a Env Config'
        required: false
        default: '' # 默认选择标签
        options:
          - ''
          - 'config.env'
          - 'config.gki.env'
          - 'config.rubens.env'
          - 'config.ginkgo.env'
        type: choice
      repos:
        description: 'Input a Kernel Source Code URL'
        required: false
        default: '' # 默认选择标签
        type: string
      branches:
        description: 'Input a Branche Name'
        required: false
        default: '' # 默认选择标签
        type: string
      artifacts:
        description: 'if Upload Artifacts'
        required: false
        default: 'true' # 默认选择标签
        options:
          - 'true'
          - 'false'
        type: choice
      releases:
        description: 'if Publish Release'
        required: false
        default: 'false' # 默认选择标签
        options:
          - 'true'
          - 'false'
        type: choice
      push:
        description: 'if Push a Branche'
        required: false
        default: 'false' # 默认选择标签
        options:
          - 'true'
          - 'false'
        type: choice

permissions:
      contents: write

jobs:
  download:
    name: Download by ${{ github.actor }}
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.WORKFLOW_TOKEN }}
        ref: main
        fetch-depth: 0 # 获取所有历史

    - name: Find Changed File
      run: |
        set +x
        bash .github/scripts/find_changed_file.sh

    - name: Setup Environment
      run: |
        cd $GITHUB_WORKSPACE
        sudo apt-get update && sudo apt-get upgrade -y
        git config --global user.name 'esureos'
        git config --global user.email 'etosercc@gmail.com'
        git config --global init.defaultBranch main

    - name: Set GITHUB_ENV based on changed file
      if: github.event_name == 'push'
      run: |
        if git diff --name-only ${{ github.event.before }} ${{ github.event.after }} | grep -q 'config.env'; then
          GITHUB_ENV=config.env
          echo "KERNEL_SOURCE=$(cat $CONFIG_ENV | grep -w "KERNEL_SOURCE" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
          echo "KERNEL_SOURCE_BRANCH=$(cat $CONFIG_ENV | grep -w "KERNEL_SOURCE_BRANCH" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        elif git diff --name-only ${{ github.event.before }} ${{ github.event.after }} | grep -q 'config.gki.env'; then
          GITHUB_ENV=config.gki.env
          echo "KERNEL_SOURCE=$(cat $CONFIG_ENV | grep -w "KERNEL_SOURCE" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
          echo "KERNEL_SOURCE_BRANCH=$(cat $CONFIG_ENV | grep -w "KERNEL_SOURCE_BRANCH" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        else
          echo "No File Changed, Use Default Config"
        fi
    - name: Read the Configuration
      if: ${{ github.event.inputs.config != '' }}
      run: |
        CONFIG_ENV=${{ github.event.inputs.config }}
        echo "KERNEL_SOURCE=$(cat $CONFIG_ENV | grep -w "KERNEL_SOURCE" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "KERNEL_SOURCE_BRANCH=$(cat $CONFIG_ENV | grep -w "KERNEL_SOURCE_BRANCH" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
    - name: Read the Configuration
      if: ${{ github.event.inputs.repos != '' && github.event.inputs.branches != '' }}
      run: |
        echo "KERNEL_SOURCE=${{ github.event.inputs.repos }}" >> $GITHUB_ENV
        echo "KERNEL_SOURCE_BRANCH=${{ github.event.inputs.branches }}" >> $GITHUB_ENV
    
    - name: Download Source Code
      id: dl
      if: ${{ github.event_name == 'push' || github.event.inputs.config != '' || github.event.inputs.repos != '' && github.event.inputs.branches != '' }}
      run: |
        mkdir android-kernel && cd android-kernel
        git clone --depth=1 ${{ env.KERNEL_SOURCE }}.git -b ${{ env.KERNEL_SOURCE_BRANCH }} ${{ env.KERNEL_SOURCE_BRANCH }}
        aria2c ${{ env.KERNEL_SOURCE }}/+archive/refs/heads/${{ env.KERNEL_SOURCE_BRANCH }}.tar.gz -o ${{ env.KERNEL_SOURCE_BRANCH }}.tar.gz
        echo "dl_complete=true" >> $GITHUB_OUTPUT

    - name: Check if remote branch exists
      if: ${{ github.event.inputs.push == 'true' && steps.dl.outputs.dl_complete == 'true' }}
      id: check_branch
      run: |
        cd $GITHUB_WORKSPACE/android-kernel/${{ env.KERNEL_SOURCE_BRANCH }}
        rm -rf .git
        git init
        git remote add origin https://esureos:${{ secrets.WORKFLOW_TOKEN }}@github.com/esureos/KernelSU_Action.git
        if git ls-remote --heads https://esureos:${{ secrets.WORKFLOW_TOKEN }}@github.com/esureos/KernelSU_Action.git ${{ env.KERNEL_SOURCE_BRANCH }} | grep -q refs/heads/${{ env.KERNEL_SOURCE_BRANCH }}; then
          echo "branch_exists=true" >> $GITHUB_OUTPUT
        else
          echo "branch_exists=false" >> $GITHUB_OUTPUT
        fi
    - name: Pull changes if branch exists
      id: pull
      if: steps.check_branch.outputs.branch_exists == 'true'
      run: |
        git fetch origin ${{ env.KERNEL_SOURCE_BRANCH }}
        git checkout ${{ env.KERNEL_SOURCE_BRANCH }}
        git pull origin ${{ env.KERNEL_SOURCE_BRANCH }}
        if git diff --quiet && git diff --staged --quiet; then
          echo "No changes detected."
        else
          echo "changes_exist=true" >> GITHUB_OUTPUT
          git add .
          git commit -m "Add downloaded source code"
          git push origin ${{ env.KERNEL_SOURCE_BRANCH }}
        fi
    - name: Push new branch if not exists
      if: steps.check_branch.outputs.branch_exists == 'false'
      run: |
        git checkout -b ${{ env.KERNEL_SOURCE_BRANCH }}
        git add .
        git commit -m "Add downloaded source code"
        git push origin ${{ env.KERNEL_SOURCE_BRANCH }}

    - name: Upload Artifacts
      if: ${{ github.event.inputs.artifacts }} == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.KERNEL_SOURCE_BRANCH }}
        path: |
          ./android-kernel/${{ env.KERNEL_SOURCE_BRANCH }}.tar.gz
    - name: Release
      if: ${{ github.event.inputs.releases }} == 'true'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.KERNEL_SOURCE_BRANCH }}
        files: |
          ./android-kernel/${{ env.KERNEL_SOURCE_BRANCH }}.tar.gz
