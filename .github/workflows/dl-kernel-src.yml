name: Download Kernel Source Code

on:
  workflow_dispatch:
    inputs:
      config:
        description: 'Choose a env Config'
        required: false
        default: '' # 默认选择标签
        options:
          - ''
          - 'config.env'
          - 'config.gki.env'
          - 'config.rubens.env'
          - 'config.ginkgo.env'
        type: choice
      repos:
        description: 'Input a Kernel Source Code URL'
        required: false
        default: '' # 默认选择标签
        type: string
      branches:
        description: 'Input a Branche Name'
        required: false
        default: '' # 默认选择标签
        type: string
      artifacts:
        description: 'Input a Branche Name'
        required: false
        default: 'true' # 默认选择标签
        type: string
      releases:
        description: 'Input a Branche Name'
        required: false
        default: 'false' # 默认选择标签
        type: string
      push:
        description: 'Input a Branche Name'
        required: false
        default: 'false' # 默认选择标签
        options:
          - 'true'
          - 'false'
        type: choice

permissions:
      contents: write

jobs:
  download:
    name: Download by ${{ github.actor }}
    runs-on: ubuntu-latest
    steps:
    - name: Setup Environment
      run: |
        cd $GITHUB_WORKSPACE
        sudo apt-get update && sudo apt-get upgrade -y
        git config --global user.name 'esureos'
        git config --global user.email 'etosercc@gmail.com'
    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.WORKFLOW_TOKEN }}
        ref: main
    - name: Read the Configuration
      if: ${{ github.event.inputs.config }}
      run: |
        CONFIG_ENV=${{ github.event.inputs.config }}
        echo "KERNEL_SOURCE=$(cat $CONFIG_ENV | grep -w "KERNEL_SOURCE" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "KERNEL_SOURCE_BRANCH=$(cat $CONFIG_ENV | grep -w "KERNEL_SOURCE_BRANCH" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
    - name: Read the Configuration
      if: ${{ github.event.inputs.repos }} && ${{ github.event.inputs.branches }}
      run: |
        echo "KERNEL_SOURCE=${{ github.event.inputs.repos }}" >> $GITHUB_ENV
        echo "KERNEL_SOURCE_BRANCH=${{ github.event.inputs.branches }}" >> $GITHUB_ENV
    - name: Download Source Code
      run: |
        mkdir android-kernel && cd android-kernel
        git clone --depth=1 ${{ env.KERNEL_SOURCE_BRANCH }}.git -b ${{ env.KERNEL_SOURCE_BRANCH }} ${{ env.KERNEL_SOURCE_BRANCH }}
        aria2c ${{ env.KERNEL_SOURCE_BRANCH }}/+archive/refs/heads/${{ env.KERNEL_SOURCE_BRANCH }}.tar.gz -o ${{ env.KERNEL_SOURCE_BRANCH }}.tar.gz
    - name: Upload Artifacts
      if: ${{ github.event.inputs.artifacts }} == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.KERNEL_SOURCE_BRANCH }}
        path: |
          ./android-kernel/${{ env.KERNEL_SOURCE_BRANCH }}.tar.gz
    - name: Release
      if: ${{ github.event.inputs.releases }} == 'true'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.KERNEL_SOURCE_BRANCH }}
        files: |
          ./android-kernel/${{ env.KERNEL_SOURCE_BRANCH }}.tar.gz
    - name: Push new branch to remote
      if: ${{ github.event.inputs.push }} == 'true'
      run: |
        cd $GITHUB_WORKSPACE/android-kernel/common
        rm -rf .git
        git config --global init.defaultBranch main
        git init
        git remote add origin https://esureos:${{ secrets.WORKFLOW_TOKEN }}@github.com/esureos/KernelSU_Action.git
        git checkout -b ${{ env.KERNEL_SOURCE_BRANCH }}
        git add .
        git commit -m "Add downloaded source code"
        git push origin ${{ env.KERNEL_SOURCE_BRANCH }}
